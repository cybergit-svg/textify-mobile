<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Textify - Mobile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .editor { min-height: calc(100vh - 140px); outline: none; }
  </style>
</head>
<body class="bg-gray-50">

<!-- Blocco Desktop -->
<div id="desktop-block" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
  <div class="text-center text-white px-6">
    <i class="fas fa-mobile-alt text-6xl mb-6 text-indigo-400"></i>
    <h1 class="text-3xl font-bold mb-3">Solo per Smartphone</h1>
    <p class="text-gray-300">Questa versione è ottimizzata solo per dispositivi mobili.</p>
    <a href="https://sergioprincipato0501-cloud.github.io/textify/" 
       class="mt-8 inline-block bg-white text-black px-6 py-3 rounded-xl font-medium">
      Vai alla versione Desktop →
    </a>
  </div>
</div>

<div class="flex flex-col h-screen">
  <!-- Header -->
  <div class="bg-white border-b px-4 py-3 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-indigo-600">Textify</h1>
    <div id="user-header" class="hidden items-center gap-2">
      <div id="avatar-small" class="w-7 h-7 bg-indigo-100 rounded-full flex items-center justify-center text-xs font-bold"></div>
      <span id="username-small" class="text-sm font-medium"></span>
    </div>
  </div>

  <!-- Schermata File -->
  <div id="files-screen" class="flex-1 overflow-auto bg-white">
    <div class="p-4">
      <button onclick="newDocument()" 
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl flex items-center justify-center gap-3 text-lg font-medium">
        <i class="fas fa-plus"></i> Nuovo Documento
      </button>
    </div>
    
    <div class="px-4 py-2 text-sm font-medium text-gray-500">I MIEI DOCUMENTI</div>
    <div id="documents-list" class="px-2"></div>
  </div>

  <!-- Schermata Editor -->
  <div id="editor-screen" class="flex-1 flex flex-col hidden">
    <div class="bg-white border-b px-4 py-3 flex items-center gap-3">
      <button onclick="showFilesScreen()" class="text-indigo-600">
        <i class="fas fa-chevron-left text-xl"></i>
      </button>
      <input type="text" id="doc-title" 
             class="flex-1 text-lg font-semibold outline-none bg-transparent" 
             placeholder="Titolo documento">
      <button onclick="saveDocument()" class="bg-green-600 text-white px-5 py-2 rounded-xl text-sm font-medium">
        Salva
      </button>
    </div>

    <div class="flex-1 p-4 overflow-auto bg-white">
      <div id="editor" contenteditable="true" class="editor text-base leading-relaxed"></div>
    </div>

    <!-- Toolbar inferiore -->
    <div class="bg-white border-t p-3 flex gap-4 justify-center">
      <button onclick="formatText('bold')" class="w-10 h-10 flex items-center justify-center text-xl"><i class="fas fa-bold"></i></button>
      <button onclick="formatText('italic')" class="w-10 h-10 flex items-center justify-center text-xl"><i class="fas fa-italic"></i></button>
      <button onclick="formatText('underline')" class="w-10 h-10 flex items-center justify-center text-xl"><i class="fas fa-underline"></i></button>
      <button onclick="showFilesScreen()" class="w-10 h-10 flex items-center justify-center text-xl text-indigo-600">
        <i class="fas fa-folder-open"></i>
      </button>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div id="auth-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-50">
  <div class="bg-white rounded-3xl w-full max-w-sm mx-4 p-8">
    <h2 id="modal-title" class="text-2xl font-bold mb-6 text-center">Accedi</h2>
    
    <div id="login-form">
      <input type="email" id="login-email" placeholder="Email" class="w-full px-5 py-4 border rounded-2xl mb-3">
      <input type="password" id="login-password" placeholder="Password" class="w-full px-5 py-4 border rounded-2xl mb-6">
      <button onclick="login()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl text-lg font-medium">Accedi</button>
      <p class="text-center mt-6">Non hai un account? 
        <span onclick="switchToRegister()" class="text-indigo-600 font-medium">Registrati</span>
      </p>
    </div>

    <div id="register-form" class="hidden">
      <input type="email" id="reg-email" placeholder="Email" class="w-full px-5 py-4 border rounded-2xl mb-3">
      <input type="password" id="reg-password" placeholder="Password (min 6)" class="w-full px-5 py-4 border rounded-2xl mb-6">
      <button onclick="register()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl text-lg font-medium">Crea Account</button>
      <p class="text-center mt-6">Hai già un account? 
        <span onclick="switchToLogin()" class="text-indigo-600 font-medium">Accedi</span>
      </p>
    </div>
  </div>
</div>

<script>
// ================== FIREBASE CONFIG ==================
const firebaseConfig = {
  apiKey: "AIzaSyCOdvjyrG1h3mKLtBE9cf2K6j9M_sw5wzU",
  authDomain: "textify-11b6b.firebaseapp.com",
  projectId: "textify-11b6b",
  storageBucket: "textify-11b6b.firebasestorage.app",
  messagingSenderId: "715682461511",
  appId: "1:715682461511:web:8ca4e5fd161d68882efe62"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentDocId = null;

function getDisplayName(email) {
  return email.split('@')[0];
}

// Blocca Desktop
function checkDevice() {
  if (window.innerWidth > 768) {
    document.getElementById('desktop-block').classList.remove('hidden');
  }
}

// ====================== AUTH ======================
function showAuthModal() {
  document.getElementById('auth-modal').classList.remove('hidden');
}

function switchToRegister() {
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('register-form').classList.remove('hidden');
}

function switchToLogin() {
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('register-form').classList.add('hidden');
}

async function register() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  try {
    const res = await auth.createUserWithEmailAndPassword(email, password);
    currentUser = res.user;
    initAfterLogin();
  } catch (e) { alert(e.message); }
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  try {
    const res = await auth.signInWithEmailAndPassword(email, password);
    currentUser = res.user;
    initAfterLogin();
  } catch (e) { alert(e.message); }
}

function logout() { auth.signOut(); }

function initAfterLogin() {
  document.getElementById('auth-modal').classList.add('hidden');
  const name = getDisplayName(currentUser.email);
  document.getElementById('username-small').textContent = name;
  document.getElementById('avatar-small').textContent = name[0].toUpperCase();
  document.getElementById('user-header').classList.remove('hidden');
  showFilesScreen();
  loadUserDocuments();
}

// ====================== NAVIGAZIONE ======================
function showFilesScreen() {
  document.getElementById('files-screen').classList.remove('hidden');
  document.getElementById('editor-screen').classList.add('hidden');
}

function showEditorScreen() {
  document.getElementById('files-screen').classList.add('hidden');
  document.getElementById('editor-screen').classList.remove('hidden');
}

// ====================== DOCUMENTI ======================
async function newDocument() {
  currentDocId = 'doc_' + Date.now();
  document.getElementById('doc-title').value = 'Nuovo Documento';
  document.getElementById('editor').innerHTML = '<p>Inizia a scrivere qui...</p>';
  showEditorScreen();
  loadUserDocuments();
}

async function saveDocument() {
  if (!currentDocId) return;
  const title = document.getElementById('doc-title').value.trim() || 'Documento senza titolo';
  const content = document.getElementById('editor').innerHTML;

  try {
    await db.collection('documents').doc(currentDocId).set({
      userId: currentUser.uid,
      title: title,
      content: content,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("✅ Salvato!");
    loadUserDocuments();
  } catch (e) { alert("Errore salvataggio"); }
}

async function loadUserDocuments() {
  const list = document.getElementById('documents-list');
  list.innerHTML = '<p class="text-center py-8 text-gray-400">Caricamento...</p>';

  try {
    const snapshot = await db.collection('documents').where('userId', '==', currentUser.uid).get();
    list.innerHTML = '';

    if (snapshot.empty) {
      list.innerHTML = `<p class="text-center py-12 text-gray-400">Nessun documento salvato</p>`;
      return;
    }

    snapshot.forEach(doc => {
      const data = doc.data();
      const el = document.createElement('div');
      el.className = `px-4 py-4 border-b flex justify-between items-center ${doc.id === currentDocId ? 'bg-indigo-50' : ''}`;
      el.innerHTML = `
        <div onclick="loadDocument('${doc.id}')" class="flex-1 cursor-pointer">
          <p class="font-medium">${data.title}</p>
        </div>
        <button onclick="deleteDocument('${doc.id}'); event.stopImmediatePropagation()" 
                class="w-8 h-8 flex items-center justify-center text-red-500 hover:bg-red-50 rounded-xl">
          <i class="fas fa-trash"></i>
        </button>
      `;
      list.appendChild(el);
    });
  } catch (e) {
    list.innerHTML = `<p class="text-red-500 text-center py-8">Errore di caricamento</p>`;
  }
}

async function loadDocument(id) {
  currentDocId = id;
  try {
    const doc = await db.collection('documents').doc(id).get();
    if (doc.exists) {
      const data = doc.data();
      document.getElementById('doc-title').value = data.title;
      document.getElementById('editor').innerHTML = data.content || '';
      showEditorScreen();
    }
  } catch (e) { alert("Errore caricamento"); }
}

async function deleteDocument(id) {
  if (!confirm("Vuoi eliminare questo documento?")) return;
  try {
    await db.collection('documents').doc(id).delete();
    if (currentDocId === id) {
      showFilesScreen();
    }
    loadUserDocuments();
  } catch (e) {
    alert("Errore eliminazione");
  }
}

function formatText(cmd) {
  document.execCommand(cmd);
}

// ====================== AVVIO ======================
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    initAfterLogin();
  } else {
    showAuthModal();
  }
});

window.onload = checkDevice;
</script>
</body>
</html>
